name: Release Endfield Wiki⁺ Plugin

on:
  push:
    branches:
      - master

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

concurrency:
  group: end-wikiplus-release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release:
    if: contains(github.event.head_commit.message, 'Release')
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: latest
          run_install: false

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run Endfield Wiki⁺ smoke
        run: pnpm --filter @inpageedit/end-wikiplus smoke

      - name: Read plugin metadata
        id: plugin-meta
        working-directory: plugins/end-wikiplus/artifacts/inpageedit-next-end-wikiplus
        shell: bash
        run: |
          PKG_VERSION="$(jq -r '.version' ../../package.json)"
          MANIFEST_VERSION="$(jq -r '.version' manifest.json)"
          PLUGIN_ID="$(jq -r '.id' manifest.json)"
          PLUGIN_NAME="$(jq -r '.name' manifest.json)"
          ARTIFACT_DIR="$(basename "$PWD")"

          if [[ "$PKG_VERSION" != "$MANIFEST_VERSION" ]]; then
            echo "Version mismatch: package.json=$PKG_VERSION manifest.json=$MANIFEST_VERSION"
            exit 1
          fi

          SHORT_SHA="${GITHUB_SHA::7}"
          TAG_NAME="end-wikiplus/v${PKG_VERSION}-${SHORT_SHA}"
          ASSET_NAME="${PLUGIN_ID}-v${PKG_VERSION}.zip"

          echo "version=$PKG_VERSION" >> "$GITHUB_OUTPUT"
          echo "plugin_id=$PLUGIN_ID" >> "$GITHUB_OUTPUT"
          echo "plugin_name=$PLUGIN_NAME" >> "$GITHUB_OUTPUT"
          echo "artifact_dir=$ARTIFACT_DIR" >> "$GITHUB_OUTPUT"
          echo "tag_name=$TAG_NAME" >> "$GITHUB_OUTPUT"
          echo "asset_name=$ASSET_NAME" >> "$GITHUB_OUTPUT"

      - name: Package importable ZIP
        id: package-zip
        working-directory: plugins/end-wikiplus/artifacts
        shell: bash
        run: |
          ASSET_PATH="$RUNNER_TEMP/${{ steps.plugin-meta.outputs.asset_name }}"
          STAGING_ROOT="$RUNNER_TEMP/${{ steps.plugin-meta.outputs.plugin_id }}"

          rm -rf "$STAGING_ROOT"
          mkdir -p "$STAGING_ROOT"

          cp "${{ steps.plugin-meta.outputs.artifact_dir }}/manifest.json" "$STAGING_ROOT/manifest.json"
          cp -R "${{ steps.plugin-meta.outputs.artifact_dir }}/dist" "$STAGING_ROOT/dist"

          (
            cd "$RUNNER_TEMP"
            zip -r "$ASSET_PATH" "${{ steps.plugin-meta.outputs.plugin_id }}" -x "*.map" -x "__MACOSX/*"
          )

          echo "asset_path=$ASSET_PATH" >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.plugin-meta.outputs.tag_name }}
          target_commitish: ${{ github.sha }}
          name: ${{ steps.plugin-meta.outputs.plugin_name }} v${{ steps.plugin-meta.outputs.version }}
          generate_release_notes: true
          files: ${{ steps.package-zip.outputs.asset_path }}
