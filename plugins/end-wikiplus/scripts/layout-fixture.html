<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Quick Edit Layout Fixture</title>
    <link rel="stylesheet" href="../artifacts/inpageedit-next-end-wikiplus/dist/styles.css" />
    <style>
      html,
      body {
        margin: 0;
        min-height: 100%;
        background: #1f2937;
      }

      #layout-metrics {
        position: fixed;
        top: 8px;
        left: 8px;
        z-index: 999999;
        max-width: min(42rem, calc(100vw - 16px));
        max-height: min(40vh, calc(100vh - 16px));
        overflow: auto;
        margin: 0;
        padding: 12px;
        border-radius: 8px;
        background: rgba(15, 23, 42, 0.92);
        color: #e5e7eb;
        font: 12px/1.4 ui-monospace, SFMono-Regular, Menlo, monospace;
        white-space: pre-wrap;
      }
    </style>
  </head>
  <body>
    <script type="module">
      const metricsNode = document.createElement('pre')
      metricsNode.id = 'layout-metrics'
      metricsNode.textContent = 'booting'
      document.body.append(metricsNode)

      const setMetrics = (value) => {
        metricsNode.textContent = JSON.stringify(value, null, 2)
      }

      window.addEventListener('error', (event) => {
        document.body.dataset.error = 'true'
        setMetrics({
          type: 'error',
          message: event.message,
          filename: event.filename,
          lineno: event.lineno,
          colno: event.colno,
        })
      })

      window.addEventListener('unhandledrejection', (event) => {
        document.body.dataset.error = 'true'
        setMetrics({
          type: 'unhandledrejection',
          message: String(event.reason?.stack || event.reason),
        })
      })

      const listeners = new Map()
      const ok = (data) => ({ ok: true, data })
      const currentItem = { itemId: '56', name: 'Test', lang: 'zh_Hans' }
      const selfPlugin = {
        id: 'inpageedit-next-end-wikiplus',
        name: 'InPageEdit NEXT for Endfield Wiki+',
        version: '0.1.0',
        enabled: true,
        pages: ['wiki-renderer'],
      }

      const hostContext = {
        host: {
          getInfo: async () => ok({ apiVersion: 1, appVersion: 'dev', platform: 'desktop-tauri' }),
        },
        page: {
          getContext: async () =>
            ok({
              kind: 'wiki-renderer',
              routeName: 'wiki-render',
              fullPath: '/wiki-renderer/test',
              params: {},
              query: {},
              wikiItemId: '56',
              wikiItemName: 'Test',
              hasWikiItem: true,
            }),
        },
        wiki: {
          getCurrentItem: async () => ok(currentItem),
          fetchCatalog: async () => ok({ items: [] }),
          fetchItem: async () => ok({ item: currentItem }),
          fetchMe: async () => ok({ item: null }),
          fetchUpdateInfo: async () =>
            ok({
              item: currentItem,
              revisionId: 1,
              content: '{\n  "itemId": "56"\n}',
              contentModel: 'json',
              timestamp: 'now',
              categories: [],
            }),
          submitItemUpdate: async () => ok({ revisionId: 2 }),
          clearItemDraft: async () => ok(null),
        },
        auth: {
          getSession: async () =>
            ok({
              hasSession: false,
              credentialSource: '',
              wikiProfileNickname: '',
              wikiProfileAvatar: '',
              wikiProfileUserId: '',
            }),
        },
        storage: {
          getItem: async () => ok(null),
          setItem: async () => ok(null),
          removeItem: async () => ok(null),
          listKeys: async () => ok([]),
        },
        ui: {
          notify: async () => ok(null),
        },
        plugins: {
          getSelf: async () => ok(selfPlugin),
          getLoaded: async () => ok([selfPlugin]),
        },
        events: {
          on: async (event, handler) => {
            const handlers = listeners.get(event) || new Set()
            handlers.add(handler)
            listeners.set(event, handlers)
            return ok(() => handlers.delete(handler))
          },
          emit: async (event, payload) => {
            const handlers = listeners.get(event)
            if (handlers) {
              for (const handler of handlers) {
                await handler(payload)
              }
            }
            return ok({ pluginId: selfPlugin.id, event, payload })
          },
        },
      }

      const logger = { info() {}, warn(...args) { console.warn(...args) }, error(...args) { console.error(...args) }, debug() {} }
      window.__END_WIKIPLUS_PLUGIN_LOGGER__ = logger
      globalThis.__END_WIKIPLUS_PLUGIN_LOGGER__ = logger
      window.process = window.process || { env: { NODE_ENV: 'production' } }
      globalThis.process = globalThis.process || window.process

      const bundleUrl = new URL('../artifacts/inpageedit-next-end-wikiplus/dist/index.js', window.location.href)
      bundleUrl.searchParams.set('ts', Date.now().toString())
      const mod = await import(bundleUrl.href)
      await mod.default.activate(hostContext)
      await new Promise((resolve) => setTimeout(resolve, 250))

      document.querySelector('#ipe-toolbox__quick-edit-btn')?.dispatchEvent(
        new MouseEvent('click', { bubbles: true })
      )

      const pick = (selector) => document.querySelector(selector)
      const rect = (selector) => {
        const node = pick(selector)
        if (!node) {
          return null
        }
        const box = node.getBoundingClientRect()
        const style = getComputedStyle(node)
        return {
          selector,
          clientHeight: node.clientHeight,
          offsetHeight: node.offsetHeight,
          scrollHeight: node.scrollHeight,
          top: Math.round(box.top),
          height: Math.round(box.height),
          bottom: Math.round(box.bottom),
          display: style.display,
          overflow: style.overflow,
          minHeight: style.minHeight,
          heightStyle: style.height,
          flex: style.flex,
          position: style.position,
        }
      }

      for (let i = 0; i < 40; i += 1) {
        if (pick('.ipe-modal-modal__window.ipe-quickEdit')) {
          break
        }
        await new Promise((resolve) => requestAnimationFrame(resolve))
      }

      await new Promise((resolve) => setTimeout(resolve, 1200))

      const summary = pick('input[name="summary"]')
      const editor = pick('.endwiki-monacoEditor')
      const options = pick('.ipe-quickEdit__options')
      const editorRect = editor?.getBoundingClientRect()
      const optionsRect = options?.getBoundingClientRect()

      document.body.dataset.ready = 'true'
      setMetrics({
        viewport: {
          innerWidth: window.innerWidth,
          innerHeight: window.innerHeight,
          devicePixelRatio: window.devicePixelRatio,
        },
        nodes: {
          modalWindow: rect('.ipe-modal-modal__window.ipe-quickEdit'),
          modalContent: rect('.ipe-modal-modal__window.ipe-quickEdit .ipe-modal-modal__content'),
          form: rect('.ipe-quickEdit__form'),
          notices: rect('.ipe-quickEdit__notices'),
          editorContent: rect('.ipe-quickEdit__content'),
          monaco: rect('.endwiki-monacoEditor'),
          monacoSurface: rect('.endwiki-monacoEditor__surface'),
          monacoContainer: rect('.endwiki-monacoEditor__container'),
          usages: rect('.ipe-quickEdit__usages'),
          options: rect('.ipe-quickEdit__options'),
          summaryInput: rect('input[name="summary"]'),
          footer: rect('.ipe-modal-modal__window.ipe-quickEdit .ipe-modal-modal__footer'),
        },
        editorMode: editor?.getAttribute('data-editor-mode'),
        summaryVisible: Boolean(summary),
        overlap: editorRect && optionsRect ? Math.round(editorRect.bottom - optionsRect.top) : null,
      })
    </script>
  </body>
</html>
